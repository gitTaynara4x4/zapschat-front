<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZapChats • Manutenção</title>
  <style>
    :root{--bg:#0b1220;--card:#0f1a30;--border:rgba(255,255,255,.08);--fg:#e5e7eb;--muted:#9ca3af;--acc:#22c55e;}
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--fg);
      background:
        radial-gradient(900px 420px at 50% 40%, rgba(34,197,94,.16), transparent 60%),
        radial-gradient(700px 420px at 30% 70%, rgba(59,130,246,.10), transparent 60%),
        var(--bg);
      padding:24px;
    }
    .card{
      width:min(640px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius:20px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .top{display:flex;gap:14px;align-items:center;margin-bottom:8px}
    .logo{
      width:44px;height:44px;border-radius:14px;
      background:linear-gradient(135deg, rgba(34,197,94,.35), rgba(16,185,129,.15));
      border:1px solid rgba(34,197,94,.35);
      display:grid;place-items:center;
    }
    .dot{width:10px;height:10px;border-radius:999px;background:var(--acc);box-shadow:0 0 0 6px rgba(34,197,94,.12)}
    h1{font-size:22px;margin:0}
    p{margin:10px 0 0;color:var(--muted);line-height:1.6}
    .row{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:10px 14px;border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--fg);text-decoration:none;font-size:14px;
    }
    .btn.primary{
      border-color:rgba(34,197,94,.35);
      background:rgba(34,197,94,.14);
    }
    code{background:rgba(255,255,255,.05);padding:2px 6px;border-radius:8px;border:1px solid var(--border)}
    .small{font-size:12px;color:var(--muted);margin-top:14px}
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="logo"><span class="dot"></span></div>
      <div>
        <h1>Estamos fazendo uma manutenção rápida</h1>
        <p>O ZapChats está reiniciando/atualizando. Em instantes volta ao normal.</p>
      </div>
    </div>

    <p>Você pode tentar novamente daqui a alguns segundos.</p>

    <div class="row">
      <a class="btn primary" href="javascript:location.reload()">Tentar novamente</a>
      <a class="btn" href="https://wa.me/55SEUNUMEROAQUI" target="_blank" rel="noopener">Falar no WhatsApp</a>
    </div>

    <div class="small">Status: <code>serviço indisponível</code></div>
  </div>

  <script>
    setInterval(() => location.reload(), 5000);
  </script>
</body>
</html>
