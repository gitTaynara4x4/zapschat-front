<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Atualizando | ZapChat</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
  
  <style>
    :root {
      --bg-color: #f0f9ff;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Fundo com um gradiente azul bem suave e amigável */
      background: linear-gradient(135deg, var(--bg-color) 0%, #e0f2fe 100%);
      color: var(--text-main);
      padding: 24px;
    }

    /* Card Clean e Minimalista */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Container do Lottie para não quebrar o layout */
    .lottie-container {
      margin-top: -20px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 280px; /* Controla o tamanho máximo da animação */
      display: flex;
      justify-content: center;
    }

    /* Textos */
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    p strong {
      color: var(--primary);
    }

    /* Botões */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-bottom: 24px;
    }

    .btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.2s ease;
      width: 100%;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
    }

    .btn-secondary {
      background: #ffffff;
      color: var(--text-main);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    /* Rodapé Técnico super discreto */
    .footer-info {
      width: 100%;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    code {
      background: #f1f5f9;
      padding: 4px 8px;
      border-radius: 6px;
      font-family: ui-monospace, monospace;
      color: var(--text-main);
      font-weight: 600;
      font-size: 12px;
    }

    /* Responsividade para colocar os botões lado a lado no PC */
    @media (min-width: 480px) {
      .actions {
        flex-direction: row;
      }
    }
  </style>
</head>
<body>

  <main class="card">
    
    <div class="lottie-container">
      <dotlottie-wc 
        src="https://lottie.host/8bf6d774-09bb-4771-8e10-923ebd5d587b/0lYmjhMV7y.lottie" 
        style="width: 100%; height: 250px;" 
        autoplay 
        loop>
      </dotlottie-wc>
    </div>
    
    <h1>Estamos atualizando para você.</h1>
    
    <p>
      O <strong>ZapChat</strong> está passando por melhorias nos bastidores para deixar tudo mais rápido e seguro. Voltamos em alguns instantes!
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="javascript:location.reload()">Recarregar página</a>
      <a class="btn btn-secondary" href="/__alive">Ver status</a>
    </div>

    <div class="footer-info">
      <span>Sessão: <code>#ZC-{{request_id}}</code></span>
      <span>Gateway: <code>502 / 503</code></span>
    </div>

  </main>

</body>
</html>
