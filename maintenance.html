<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manutenção | ZapChat</title>
  <style>
    :root {
      --bg: #030712;
      --card: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #10b981;
      --primary: #3b82f6;
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(540px, 100%);
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      position: relative;
    }

    .dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(3); opacity: 0; }
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #fff, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(255, 255, 255, 0.1);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .footer-info {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: rgba(156, 163, 175, 0.5);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    code {
      font-family: ui-monospace, monospace;
      color: var(--primary);
      background: rgba(59, 130, 246, 0.1);
      padding: 2px 4px;
      border-radius: 4px;
    }

    @media (min-width: 480px) {
      .actions { flex-direction: row; justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">
      <span class="dot"></span>
      Sistemas em atualização
    </div>
    
    <h1>Voltamos logo.</h1>
    
    <p>
      O <strong>ZapChat</strong> está passando por uma manutenção programada para melhorar sua experiência. 
      Agradecemos a paciência.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="javascript:location.reload()">Recarregar página</a>
      <a class="btn btn-secondary" href="/__alive">Status do sistema</a>
    </div>

    <div class="footer-info">
      <span>ID da Sessão: #ZC-{{request_id}}</span>
      <span>O gateway Nginx reportou <code>502/503</code> no upstream.</span>
    </div>
  </main>
</body>
</html>
