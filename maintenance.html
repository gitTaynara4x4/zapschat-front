<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZapChat em manutenção</title>
  <style>
    body{margin:0;display:grid;place-items:center;min-height:100vh;background:#0b0f17;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .card{max-width:560px;padding:28px 24px;border:1px solid #1f2937;border-radius:16px;background:rgba(255,255,255,.04)}
    h1{margin:0 0 10px;font-size:22px}
    p{margin:0 0 14px;color:#a1a1aa;line-height:1.45}
    .muted{font-size:13px;color:#6b7280}
  </style>
</head>
<body>
  <div class="card">
    <h1>Estamos em manutenção</h1>
    <p>O ZapChat está passando por uma atualização rápida. Tente novamente em instantes.</p>
    <p class="muted">Se você é do suporte: verifique o serviço <b>app-zapchats</b> no EasyPanel.</p>
  </div>
</body>
</html>
