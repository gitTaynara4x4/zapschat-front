<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZapChats • Manutenção</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#0f1a30;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#22c55e;
      --border:rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(34,197,94,.18), transparent 60%),
                  radial-gradient(900px 500px at 90% 30%, rgba(16,185,129,.12), transparent 55%),
                  var(--bg);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(720px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius:18px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .top{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:10px;
    }
    .logo{
      width:44px;height:44px;border-radius:14px;
      background:conic-gradient(from 210deg, #22c55e, #10b981, #16a34a, #22c55e);
      box-shadow:0 10px 25px rgba(34,197,94,.25);
    }
    h1{
      font-size:20px;
      margin:0;
    }
    p{
      margin:10px 0 0;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }
    .row{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    a.btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      text-decoration:none;
      color:var(--text);
      background:rgba(0,0,0,.12);
      font-size:14px;
    }
    a.btn.primary{
      border-color:rgba(34,197,94,.35);
      background:rgba(34,197,94,.14);
    }
    .hint{
      margin-top:16px;
      padding:12px 14px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.14);
      color:var(--muted);
      font-size:13px;
    }
    code{color:#d1fae5}
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="logo" aria-hidden="true"></div>
      <div>
        <h1>ZapChats está temporariamente indisponível</h1>
        <p>Estamos realizando ajustes/atualização. Tente novamente em alguns instantes.</p>
      </div>
    </div>

    <div class="row">
      <a class="btn primary" href="/">Tentar novamente</a>
      <a class="btn" href="/__alive">Status do proxy</a>
    </div>

    <div class="hint">
      Dica técnica: se você é admin, teste <code>/__alive</code> (proxy) e o <code>/healthz</code> da API quando voltar.
    </div>
  </div>
</body>
</html>
