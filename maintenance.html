<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Estamos em manutenção</title>
  <style>
    :root{
      --bg:#0b1220; --card:#0f1b33; --border:rgba(255,255,255,.10);
      --text:#e5e7eb; --muted:#9ca3af; --accent:#22c55e;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;
      background: radial-gradient(1000px 600px at 30% 20%, rgba(34,197,94,.18), transparent 55%),
                  radial-gradient(900px 600px at 70% 80%, rgba(59,130,246,.14), transparent 60%),
                  var(--bg);
      color:var(--text);
      padding:24px;
    }
    .card{
      width:min(720px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius:18px;
      padding:28px;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    .badge{
      display:inline-flex; align-items:center; gap:10px;
      padding:8px 12px; border-radius:999px;
      border:1px solid var(--border);
      background:rgba(34,197,94,.10);
      color:#bbf7d0;
      font-weight:600;
      letter-spacing:.2px;
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 18px rgba(34,197,94,.8);
    }
    h1{margin:18px 0 10px; font-size:30px; line-height:1.2}
    p{margin:0; color:var(--muted); font-size:16px; line-height:1.6}
    .row{
      margin-top:18px;
      display:flex; gap:12px; flex-wrap:wrap;
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 14px; border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text); text-decoration:none;
      font-weight:600;
    }
    .btn:hover{background:rgba(255,255,255,.07)}
    .hint{
      margin-top:14px;
      font-size:13px;
      color:rgba(229,231,235,.75);
    }
    code{
      background:rgba(0,0,0,.25);
      padding:2px 6px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,.10);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge"><span class="dot"></span> Manutenção programada</span>
    <h1>Estamos em manutenção</h1>
    <p>
      O ZapChat está temporariamente indisponível. Já estamos trabalhando para normalizar.
      Tente novamente em alguns instantes.
    </p>

    <div class="row">
      <a class="btn" href="javascript:location.reload()">Tentar novamente</a>
      <a class="btn" href="/__alive">Status</a>
      <a class="btn" href="/maintenance-test">Ver esta página</a>
    </div>

    <div class="hint">
      Dica técnica: esta página aparece quando o Nginx recebe <code>502/503/504</code> do backend.
    </div>
  </main>
</body>
</html>
