# /etc/nginx/conf.d/default.conf

upstream zapchats_upstream {
    server zapchats_app-zapchats:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # =========================
    # HEALTHCHECK (sem spam)
    # =========================
    location = /__alive {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # =========================
    # MANUTENÇÃO quando backend cair (502/503/504)
    # =========================
    proxy_intercept_errors on;
    error_page 502 503 504 = /maintenance.html;

    # Página estática (interna)
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # (opcional) endpoint público só pra testar a página no browser
    location = /maintenance-test {
        root /usr/share/nginx/html;
        try_files /maintenance.html =404;
    }

    # =========================
    # WEBSOCKET (sem spam)
    # =========================
    location /ws {
        access_log off;

        proxy_pass http://zapchats_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # =========================
    # APP NORMAL (HTTP)
    # =========================
    location / {
        proxy_pass http://zapchats_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # timeouts pra cair rápido e mostrar manutenção
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}