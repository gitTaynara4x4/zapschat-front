server {
    listen 80 default_server;
    server_name _;

    # ✅ DNS interno do Docker (importante!)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ✅ Host interno do app (igual aparece no EasyPanel)
    set $backend "http://zapchats_app-zapchats:8000";

    # Quando o app cair, mostrar sua página
    proxy_intercept_errors on;
    error_page 502 503 504 = /maintenance.html;

    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Healthcheck do proxy (pra você testar e pro painel não “pirar”)
    location = /__alive {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # WebSocket (se usar /ws)
    location /ws {
        proxy_pass $backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Tudo o resto
    location / {
        proxy_pass $backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}