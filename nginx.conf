# Evita 400 por headers “diferentes” vindos do proxy
ignore_invalid_headers off;
underscores_in_headers on;

upstream zapchats_upstream {
    server zapchats_app-zapchats:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # ✅ endpoint 200 pra healthcheck do EasyPanel
    location = /__alive {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Quando o app cair, mostrar sua página
    proxy_intercept_errors on;
    error_page 502 503 504 = /maintenance.html;

    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # WebSocket (se usar /ws)
    location /ws {
        proxy_pass http://zapchats_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Tudo o resto
    location / {
        proxy_pass http://zapchats_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}