# /etc/nginx/conf.d/default.conf

upstream zapchats_upstream {
    # ✅ nome interno correto (do seu print do EasyPanel)
    server zapchats_app-zapchats:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ✅ endpoint pro healthcheck
    location = /__alive {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ✅ quando backend cair (502/503/504), mostra sua página
    proxy_intercept_errors on;
    error_page 502 503 504 = /maintenance.html;

    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # WebSocket (se seu backend usa /ws)
    location /ws {
        proxy_pass http://zapchats_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # resto do tráfego
    location / {
        proxy_pass http://zapchats_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}