# /etc/nginx/conf.d/default.conf

upstream zapchats_upstream {
    # ajuste o nome do service/host se for diferente no seu Docker/EasyPanel
    server zapchats_app-zapchats:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Healthcheck (EasyPanel / monitoramento)
    location = /__alive {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Interceptar erros do upstream e servir manutenção
    proxy_intercept_errors on;
    error_page 502 503 504 = /maintenance.html;

    # Página estática de manutenção (somente interna)
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # (opcional) Se quiser testar manualmente no browser:
    # remova o "internal" acima ou use um endpoint público de teste:
    location = /maintenance-test {
        root /usr/share/nginx/html;
        try_files /maintenance.html =404;
    }

    # WebSocket
    location /ws {
        proxy_pass http://zapchats_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # App normal (HTTP)
    location / {
        proxy_pass http://zapchats_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # timeouts pra cair rápido e mostrar manutenção
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}